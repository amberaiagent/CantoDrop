<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>order · trench</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="nav">
    <div class="wrap nav-inner">
      <a class="brand" href="/">
        <svg class="brand-mark" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M12 2C12 2 4 11 4 15.5A8 8 0 0 0 20 15.5C20 11 12 2 12 2Z" fill="currentColor"/></svg>
        <span class="wordmark">trench</span>
      </a>
      <nav class="nav-links"><a href="/#pool">live pool</a><a href="/#create" class="btn btn-primary">Create an order</a></nav>
    </div>
  </header>

  <main class="wrap status-wrap">
    <div class="panel" id="card"><p class="muted">Loading order…</p></div>
  </main>

  <script>
    const STAGES = ["pending", "funded", "active", "completed"];
    const STATUS_LABEL = { pending: "waiting for deposit", funded: "funded", active: "active", completed: "completed", cancelled: "cancelled" };
    const ROMAN = ["", "I","II","III","IV","V","VI","VII","VIII"];
    const roman = (n) => ROMAN[n] || String(n);
    const fmt = (n) => Number(n).toLocaleString("en-US", { maximumFractionDigits: Number(n) >= 1000 ? 0 : 2 });
    const fmtUsd = (n) => "$" + fmt(n);
    const ref = decodeURIComponent(location.pathname.split("/").pop());
    const card = document.getElementById("card");

    async function load() {
      try {
        const res = await fetch(`/api/orders/${encodeURIComponent(ref)}`);
        if (res.status === 404) return render404();
        const { order, preview } = await res.json();
        render(order, preview);
      } catch {
        card.innerHTML = `<p class="muted">Couldn't load this order. <a href="/">Go home</a></p>`;
      }
    }
    function render404() {
      card.innerHTML = `<h2 style="font-size:26px;line-height:32px">Order not found</h2>
        <p class="muted">No order with code <span class="mono">${ref}</span>.</p>
        <a class="btn btn-primary" href="/#create">Open a new order</a>`;
    }
    function render(o, preview) {
      const total = preview.length;
      const fired = Number(o.cantoRound) || 0;
      const ladder = preview.map((_, i) =>
        `<div class="seg ${i < fired ? "fired" : (o.status !== "pending" && i === fired ? "on" : "")}"></div>`
      ).join("");
      const previewHtml = preview.map((r, i) =>
        `<div class="mile"><div class="m-canto">Round ${r.milestone} <span class="m-cap">@ ${fmtUsd(r.marketCap)}${i < fired ? " · fired" : ""}</span></div><div class="m-amt">${fmt(r.dropAmount)}</div></div>`
      ).join("");

      card.innerHTML = `
        <div class="status-head">
          <div>
            ${o.tokenName || o.tokenTicker
              ? `<h2 style="font-size:26px;line-height:32px">${o.tokenName || ""} ${o.tokenTicker ? `<span class="muted">$${o.tokenTicker}</span>` : ""}</h2>
                 <span class="mono muted" style="font-size:13px">${o.tokenMint.slice(0,6)}…${o.tokenMint.slice(-6)} · ${o.reference}</span>`
              : `<span class="caption">contract</span>
                 <h2 style="font-size:26px;line-height:32px" class="mono">${o.tokenMint.slice(0,6)}…${o.tokenMint.slice(-6)}</h2>
                 <span class="mono muted" style="font-size:13px">${o.reference}</span>`}
          </div>
          <span class="badge ${o.status}">${STATUS_LABEL[o.status] || o.status}</span>
        </div>

        ${o.status === "cancelled" ? "" : `
          <div style="margin-top:24px">
            <div class="caption">round progress · ${fired} of ${total} rounds fired</div>
            <div class="round-ladder">${ladder}</div>
          </div>`}

        <dl class="kv">
          <dt>Contract (CA)</dt><dd>${o.tokenMint}</dd>
          <dt>Supply to drop</dt><dd>${fmt(o.depositAmount)} tokens${o.supplyPercent ? ` (${o.supplyPercent}% of supply)` : ""}</dd>
          ${o.fundedAmount ? `<dt>Funded</dt><dd>${fmt(o.fundedAmount)}${o.fundedTx ? ` · <a href="https://solscan.io/tx/${o.fundedTx}" target="_blank" rel="noopener">tx ↗</a>` : ""}</dd>` : ""}
          <dt>Target market cap</dt><dd>${fmtUsd(o.targetMarketCap)}</dd>
          ${Number(o.currentMarketCap) > 0 ? `<dt>Current market cap</dt><dd>${fmtUsd(o.currentMarketCap)}</dd>` : ""}
          <dt>Holder range</dt><dd>#${o.holderTopFrom}–#${o.holderTopTo}, even split</dd>
          <dt>Snapshot step</dt><dd>×${o.capMultiplier} of cap · ${o.splitPercent}% of remaining each round</dd>
          <dt>Pool wallet</dt><dd>${o.depositWallet}</dd>
          <dt>Created</dt><dd>${new Date(o.createdAt).toLocaleString()}</dd>
        </dl>

        ${o.status === "pending" ? `<div class="warn" style="margin-top:24px">⏳ Waiting for your deposit. Send ${fmt(o.depositAmount)} tokens to the pool wallet with memo <b>${o.reference}</b>.</div>` : ""}

        <h3 style="font-size:17px;margin:28px 0 8px">Drop schedule</h3>
        ${previewHtml}
      `;
    }
    load();
  </script>
</body>
</html>
