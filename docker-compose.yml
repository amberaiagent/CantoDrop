services:
  web:
    build: .
    # Reads DEPOSIT_WALLET, ADMIN_TOKEN, (later) DATABASE_URL from .env.
    # Keep PORT=3000 in .env — that's the port the app listens on INSIDE the
    # container. The line below maps the public port (left) to it.
    env_file:
      - .env
    ports:
      # publicPort:containerPort — serve on 80 so the domain works without :3000.
      - "${HOST_PORT:-80}:3000"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────
  # Uncomment when you switch order storage from in-memory to PostgreSQL.
  # Then set DATABASE_URL=postgres://canto:canto@db:5432/canto_drop in .env
  # and run `npm run db:init` once (or exec it inside the web container).
  # ─────────────────────────────────────────────────────────────────────
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: canto
  #     POSTGRES_PASSWORD: canto
  #     POSTGRES_DB: canto_drop
  #   volumes:
  #     - canto_pgdata:/var/lib/postgresql/data
  #   restart: unless-stopped

# volumes:
#   canto_pgdata:
